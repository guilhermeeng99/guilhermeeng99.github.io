name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate i18n (slang)
        run: dart run slang

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Bump version
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        id: bump
        run: |
          set -e
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          SEMVER=$(echo "$CURRENT" | cut -d'+' -f1)
          MAJOR=$(echo "$SEMVER" | cut -d'.' -f1)
          MINOR=$(echo "$SEMVER" | cut -d'.' -f2)
          PATCH=$(echo "$SEMVER" | cut -d'.' -f3)
          LAST_MSG=$(git log -1 --pretty=%B)

          if echo "$LAST_MSG" | grep -qE "BREAKING CHANGE|^[a-z]+(\([^)]+\))?!:"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP_KIND="major"
          elif echo "$LAST_MSG" | grep -qE "^feat(\([^)]+\))?:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP_KIND="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP_KIND="patch"
          fi

          NEW_SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          NEW_VERSION="${NEW_SEMVER}+${GITHUB_RUN_NUMBER}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml

          {
            echo "version=${NEW_VERSION}"
            echo "semver=${NEW_SEMVER}"
            echo "tag=v${NEW_SEMVER}"
            echo "kind=${BUMP_KIND}"
          } >> "$GITHUB_OUTPUT"

          echo "Bumped (${BUMP_KIND}): ${CURRENT} -> ${NEW_VERSION}"

      - name: Build web
        run: |
          flutter build web --release \
            --base-href / \
            --no-wasm-dry-run \
            --build-number=$GITHUB_RUN_NUMBER

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web

      - name: Commit and tag release
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin HEAD:master --follow-tags

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
