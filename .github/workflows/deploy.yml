name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install remote_config dependencies
        run: flutter pub get
        working-directory: packages/remote_config

      - name: Generate i18n (slang)
        run: dart run slang

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web
        run: flutter build web --release --base-href / --no-wasm-dry-run

      - name: Check static links
        run: |
          declare -a urls=(
            "https://linkedin.com/in/guigapassos"
            "https://github.com/guilhermeeng99"
            "https://blury.studio/"
          )
          failed=0
          for url in "${urls[@]}"; do
            status=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 -L "$url")
            if [[ "$status" -lt 200 || "$status" -ge 400 ]]; then
              echo "FAIL [$status]: $url"
              failed=1
            else
              echo "OK   [$status]: $url"
            fi
          done
          exit $failed

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
