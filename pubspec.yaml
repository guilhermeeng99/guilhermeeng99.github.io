name: my_portfolio
description: "My engineer portfolio app built with Flutter. Showcasing my projects, skills, and contact information in a sleek and responsive design."

publish_to: 'none'

version: 1.3.0+12

environment:
  sdk: ^3.10.8

dependencies:
  firebase_analytics: ^12.4.1
  firebase_core: ^4.9.0
  firebase_remote_config: ^6.5.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  font_awesome_flutter: ^11.0.0
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  logger: ^2.7.0
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  url_launcher: ^6.3.2

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  melos: ^7.7.0
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

melos:
  scripts:
    slang:
      run: dart run slang

    build:web:
      description: Build Flutter web (main app) for production.
      run: flutter build web --release

flutter:

  assets:
    - lib/app/assets/i18n/
    - lib/app/assets/images/
    - lib/app/assets/images/projects/
  uses-material-design: true
