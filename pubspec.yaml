name: my_portfolio
description: "My engineer portfolio app built with Flutter. Showcasing my projects, skills, and contact information in a sleek and responsive design."

publish_to: 'none'

version: 1.2.0+6

environment:
  sdk: ^3.10.8

dependencies:
  cupertino_icons: ^1.0.9
  firebase_analytics: ^12.2.0
  firebase_core: ^4.6.0
  firebase_remote_config: ^6.3.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  font_awesome_flutter: ^11.0.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  logger: ^2.7.0
  melos: ^7.5.0
  path: ^1.9.1
  remote_config:
    path: packages/remote_config
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  url_launcher: ^6.3.2
  very_good_analysis: ^10.2.0
  web: ^1.1.1
  yaml_edit: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

melos:
  scripts:
    slang:
      run: dart run slang

    generate_assets_folders:
      run: dart run my_portfolio:assets_linux

    run_release_deploy:
      run: powershell -ExecutionPolicy Bypass -File deploy_web.ps1

flutter:

  assets:
    - lib/app/assets/i18n/
    - lib/app/assets/images/
    - lib/app/assets/images/projects/
  uses-material-design: true
